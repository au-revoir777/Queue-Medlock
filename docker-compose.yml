services:

  postgres:
    image: postgres:16
    container_name: medlock_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: medlock_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: control-plane/auth-service/Dockerfile
    container_name: medlock_auth
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MTLS_CERT_PATH: /certs/auth-service.crt
      MTLS_KEY_PATH:  /certs/auth-service.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/auth-service/auth-service.crt:/certs/auth-service.crt:ro
      - ./infra/certs/auth-service/auth-service.key:/certs/auth-service.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx=ssl.create_default_context(); ctx.load_verify_locations('/certs/ca.crt'); ctx.load_cert_chain('/certs/auth-service.crt','/certs/auth-service.key'); urllib.request.urlopen('https://127.0.0.1:8000/health', context=ctx)"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  tenant-service:
    build:
      context: .
      dockerfile: control-plane/tenant-service/Dockerfile
    container_name: medlock_tenant
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_URL: https://auth-service:8000/register
      KMS_URL:  https://kms-service:8000/exchange
      MTLS_CERT_PATH: /certs/tenant-service.crt
      MTLS_KEY_PATH:  /certs/tenant-service.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/tenant-service/tenant-service.crt:/certs/tenant-service.crt:ro
      - ./infra/certs/tenant-service/tenant-service.key:/certs/tenant-service.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx=ssl.create_default_context(); ctx.load_verify_locations('/certs/ca.crt'); ctx.load_cert_chain('/certs/tenant-service.crt','/certs/tenant-service.key'); urllib.request.urlopen('https://127.0.0.1:8000/health', context=ctx)"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  kms-service:
    build:
      context: .
      dockerfile: control-plane/kms-service/Dockerfile
    container_name: medlock_kms
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MTLS_CERT_PATH: /certs/kms-service.crt
      MTLS_KEY_PATH:  /certs/kms-service.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/kms-service/kms-service.crt:/certs/kms-service.crt:ro
      - ./infra/certs/kms-service/kms-service.key:/certs/kms-service.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx=ssl.create_default_context(); ctx.load_verify_locations('/certs/ca.crt'); ctx.load_cert_chain('/certs/kms-service.crt','/certs/kms-service.key'); urllib.request.urlopen('https://127.0.0.1:8000/health', context=ctx)"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  clinical-service:
    build:
      context: .
      dockerfile: control-plane/clinical-service/Dockerfile
    container_name: medlock_clinical
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_VALIDATE_URL: https://auth-service:8000/validate
      BROKER_URL:        https://broker:9000
      KMS_URL:           https://kms-service:8000
      TENANT_URL:        https://tenant-service:8000
      MTLS_CERT_PATH: /certs/clinical-service.crt
      MTLS_KEY_PATH:  /certs/clinical-service.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/clinical-service/clinical-service.crt:/certs/clinical-service.crt:ro
      - ./infra/certs/clinical-service/clinical-service.key:/certs/clinical-service.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, ssl; ctx=ssl.create_default_context(); ctx.load_verify_locations('/certs/ca.crt'); ctx.load_cert_chain('/certs/clinical-service.crt','/certs/clinical-service.key'); urllib.request.urlopen('https://127.0.0.1:8000/health', context=ctx)"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: scripts/seed/Dockerfile
    container_name: medlock_seed
    environment:
      TENANT_URL: https://tenant-service:8000
      AUTH_URL:   https://auth-service:8000
      KMS_URL:    https://kms-service:8000
      DEMO_PASSWORD: ${DEMO_PASSWORD:-demo1234}
      MTLS_CERT_PATH: /certs/seed.crt
      MTLS_KEY_PATH:  /certs/seed.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/seed/seed.crt:/certs/seed.crt:ro
      - ./infra/certs/seed/seed.key:/certs/seed.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    networks:
      - medlock-net
    restart: "no"
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      kms-service:
        condition: service_healthy

  broker:
    build:
      context: .
      dockerfile: broker/Dockerfile
    container_name: medlock_broker
    environment:
      REDIS_URL: redis://redis:6379
      AUTH_VALIDATE_URL: https://auth-service:8000/validate
      BROKER_URL:        https://broker:9000
      KMS_URL:           https://kms-service:8000
      TENANT_URL:        https://tenant-service:8000
      MTLS_CERT_PATH: /certs/broker.crt
      MTLS_KEY_PATH:  /certs/broker.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/broker/broker.crt:/certs/broker.crt:ro
      - ./infra/certs/broker/broker.key:/certs/broker.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const https=require('https'),fs=require('fs');https.get({hostname:'broker',port:9000,path:'/health',cert:fs.readFileSync('/certs/broker.crt'),key:fs.readFileSync('/certs/broker.key'),ca:fs.readFileSync('/certs/ca.crt'),rejectUnauthorized:false},r=>process.exit(r.statusCode===200?0:1)).on('error',e=>{console.error(e.message);process.exit(1)})\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: medlock_frontend
    ports:
      - "3000:3000"
    networks:
      - medlock-net
    restart: unless-stopped

  gateway:
    image: nginx:1.27
    container_name: medlock_gateway
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs/gateway/gateway.crt:/certs/gateway/gateway.crt:ro
      - ./infra/certs/gateway/gateway.key:/certs/gateway/gateway.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      kms-service:
        condition: service_healthy
      broker:
        condition: service_healthy
      clinical-service:
        condition: service_healthy

  prometheus:
    image: prom/prometheus
    container_name: medlock_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/certs/prometheus/prometheus.crt:/certs/prometheus.crt:ro
      - ./infra/certs/prometheus/prometheus.key:/certs/prometheus.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    container_name: medlock_grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: medlock
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: medlock_simulator
    command: python simulator.py
    environment:
      AUTH_URL:   https://auth-service:8000/login
      TENANT_URL: https://tenant-service:8000
      KMS_URL:    https://kms-service:8000
      BROKER_URL: https://broker:9000
      SIM_PASSWORD: ${SIM_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MTLS_CERT_PATH: /certs/simulator.crt
      MTLS_KEY_PATH:  /certs/simulator.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
    volumes:
      - ./infra/certs/simulator/simulator.crt:/certs/simulator.crt:ro
      - ./infra/certs/simulator/simulator.key:/certs/simulator.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    networks:
      - medlock-net
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      kms-service:
        condition: service_healthy
      broker:
        condition: service_healthy
      postgres:
        condition: service_healthy

  attacker:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    command: python /app/attacker.py
    volumes:
      - ./attacker.py:/app/attacker.py
      - ./infra/certs/simulator/simulator.crt:/certs/simulator.crt:ro
      - ./infra/certs/simulator/simulator.key:/certs/simulator.key:ro
      - ./infra/certs/ca.crt:/certs/ca.crt:ro
    environment:
      SIM_PASSWORD: ${SIM_PASSWORD}
      AUTH_URL:   https://auth-service:8000/login
      TENANT_URL: https://tenant-service:8000
      BROKER_URL: https://broker:9000
      MTLS_CERT_PATH: /certs/simulator.crt
      MTLS_KEY_PATH:  /certs/simulator.key
      MTLS_CA_PATH:   /certs/ca.crt
      MTLS_REQUIRED:  "true"
      VERIFY_SSL: /certs/ca.crt
    depends_on:
      broker:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
    networks:
      - medlock-net
    profiles:
      - attack

networks:
  medlock-net:
    driver: bridge
