name: ci

on:
  push:
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile python services and SDKs
        run: |
          python -m compileall control-plane producer-sdk consumer-sdk scripts
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate broker package
        run: |
          cd broker && npm install --package-lock-only
      - name: Validate frontend package
        run: |
          cd frontend && npm install --package-lock-only
