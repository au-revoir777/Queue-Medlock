# MedLock Rate Limiter — Redis Infrastructure
# Usage: docker compose -f auth/docker-compose.redis.yml up -d

version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: medlock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
