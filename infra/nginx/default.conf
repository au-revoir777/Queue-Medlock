upstream auth_service     { server auth-service:8000;    keepalive 32; }
upstream tenant_service   { server tenant-service:8000;  keepalive 16; }
upstream kms_service      { server kms-service:8000;     keepalive 16; }
upstream broker_service   { server broker:9000;           keepalive 32; }
upstream clinical_service { server clinical-service:8000; keepalive 32; }
upstream frontend_service { server frontend:3000;         keepalive 8;  }

# ── HTTP (browser-facing) ─────────────────────────────────────────────────────
server {
    listen 8080;

    add_header X-Frame-Options        DENY            always;
    add_header X-Content-Type-Options nosniff         always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        no-referrer     always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version                 1.1;
    proxy_set_header Connection        "";

    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    location /auth/ {
        proxy_pass                    https://auth_service/;
        proxy_ssl_name                auth-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /tenant/ {
        proxy_pass                    https://tenant_service/;
        proxy_ssl_name                tenant-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /kms/ {
        proxy_pass                    https://kms_service/;
        proxy_ssl_name                kms-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /broker/ {
        proxy_pass                    https://broker_service/;
        proxy_ssl_name                broker;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_read_timeout            60s;
    }

    location /clinical/ {
        proxy_pass                    https://clinical_service/;
        proxy_ssl_name                clinical-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_set_header Upgrade      $http_upgrade;
        proxy_set_header Connection   "upgrade";
        proxy_read_timeout            3600s;
    }

    location /ws/ {
        proxy_pass                    https://clinical_service/ws/;
        proxy_ssl_name                clinical-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_set_header Upgrade      $http_upgrade;
        proxy_set_header Connection   "upgrade";
        proxy_read_timeout            3600s;
    }

    location /metrics {
        proxy_pass                    https://broker_service/metrics;
        proxy_ssl_name                broker;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location / {
        proxy_pass http://frontend_service/;
    }
}

# ── HTTPS (mTLS optional) ─────────────────────────────────────────────────────
server {

    listen 443 ssl;
    http2  on;

    ssl_certificate        /certs/gateway/gateway.crt;
    ssl_certificate_key    /certs/gateway/gateway.key;
    ssl_client_certificate /certs/ca.crt;
    ssl_verify_client      optional;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header X-Frame-Options        DENY            always;
    add_header X-Content-Type-Options nosniff         always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        no-referrer     always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Cert-CN  $ssl_client_s_dn;
    proxy_set_header X-Client-Verified $ssl_client_verify;
    proxy_http_version                 1.1;
    proxy_set_header Connection        "";

    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    location /auth/ {
        proxy_pass                    https://auth_service/;
        proxy_ssl_name                auth-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /tenant/ {
        proxy_pass                    https://tenant_service/;
        proxy_ssl_name                tenant-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /kms/ {
        proxy_pass                    https://kms_service/;
        proxy_ssl_name                kms-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location /broker/ {
        proxy_pass                    https://broker_service/;
        proxy_ssl_name                broker;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_read_timeout            60s;
    }

    location /clinical/ {
        proxy_pass                    https://clinical_service/;
        proxy_ssl_name                clinical-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_set_header Upgrade      $http_upgrade;
        proxy_set_header Connection   "upgrade";
        proxy_read_timeout            3600s;
    }

    location /ws/ {
        proxy_pass                    https://clinical_service/ws/;
        proxy_ssl_name                clinical-service;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
        proxy_set_header Upgrade      $http_upgrade;
        proxy_set_header Connection   "upgrade";
        proxy_read_timeout            3600s;
    }

    location /metrics {
        proxy_pass                    https://broker_service/metrics;
        proxy_ssl_name                broker;
        proxy_ssl_server_name         on;
        proxy_ssl_certificate         /certs/gateway/gateway.crt;
        proxy_ssl_certificate_key     /certs/gateway/gateway.key;
        proxy_ssl_trusted_certificate /certs/ca.crt;
        proxy_ssl_verify              on;
        proxy_ssl_verify_depth        2;
        proxy_ssl_session_reuse       on;
    }

    location / {
        proxy_pass http://frontend_service/;
    }
}
